kind = "web"
previewPath = "/"
title = "Revisio"
version = "1.0.0"
id = "artifacts/revisio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21082

[services.development]
run = "pnpm --filter @workspace/revisio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/revisio", "run", "build" ]
publicDir = "artifacts/revisio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21082"
BASE_PATH = "/"
